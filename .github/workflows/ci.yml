name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# TODO: Add CI jobs (typecheck, lint, test, build)
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm turbo typecheck
      - name: Lint
        run: pnpm turbo lint
      - name: Test
        run: pnpm turbo test
      - name: Build
        run: pnpm turbo build
